<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PF Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
:root {
  --bg:#080808; --surface:#111; --surface2:#181818; --surface3:#202020;
  --border:#252525; --border2:#303030;
  --accent:#f5c518; --accent-dim:rgba(245,197,24,0.10); --accent-glow:rgba(245,197,24,0.25);
  --red:#e05252; --orange:#e07d52; --green:#52c97a;
  --text:#efefef; --text2:#888; --text3:#444;
  --mono:'Space Mono',monospace; --sans:'Space Grotesk',sans-serif;
  --rad:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:200;}
.logo{font-family:var(--mono);font-size:15px;font-weight:700;letter-spacing:.08em;}
.logo span{color:var(--accent);}
nav{display:flex;gap:2px;}
nav button{background:none;border:none;color:var(--text2);font-family:var(--sans);font-size:12px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .15s;letter-spacing:.04em;text-transform:uppercase;}
nav button:hover{color:var(--text);background:var(--surface2);}
nav button.active{color:var(--accent);background:var(--accent-dim);}

/* MAIN */
main{flex:1;padding:18px;max-width:1000px;margin:0 auto;width:100%;}
.tab{display:none;} .tab.active{display:block;}

/* ── LIBRARY ── */
.lib-layout{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start;}
.cat-strip{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.cat-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);font-family:var(--sans);font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;cursor:pointer;transition:all .15s;letter-spacing:.04em;text-transform:uppercase;}
.cat-btn:hover,.cat-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.search-bar{position:relative;margin-bottom:12px;}
.search-bar input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 14px 9px 36px;outline:none;transition:border-color .15s;}
.search-bar input:focus{border-color:var(--border2);}
.search-bar svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.35;}
.ex-list{display:flex;flex-direction:column;gap:5px;max-height:calc(100vh - 240px);overflow-y:auto;padding-right:4px;}
.ex-list::-webkit-scrollbar{width:4px;} .ex-list::-webkit-scrollbar-track{background:transparent;} .ex-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:11px 14px;cursor:pointer;transition:all .15s;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.ex-card:hover{border-color:var(--border2);}
.ex-card.selected{border-color:var(--accent);background:var(--accent-dim);}
.ex-name{font-size:13px;font-weight:600;margin-bottom:2px;}
.ex-meta{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;}
.add-btn{background:var(--accent-dim);border:1px solid rgba(245,197,24,.3);color:var(--accent);font-family:var(--sans);font-size:11px;font-weight:700;padding:5px 11px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.add-btn:hover{background:var(--accent);color:#000;}

/* MUSCLE PANEL */
.muscle-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;position:sticky;top:72px;}
.panel-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
.sel-name{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:2px;min-height:20px;}
.sel-type{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;min-height:14px;}
.diagram-row{display:flex;gap:10px;justify-content:center;margin-bottom:14px;}
.svg-wrap{text-align:center;}
.svg-wrap label{display:block;font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.body-svg{width:118px;height:220px;}
.legend{display:flex;gap:14px;justify-content:center;margin-bottom:12px;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.tag-section{margin-bottom:8px;}
.tag-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{border-radius:4px;font-size:10px;padding:2px 8px;border:1px solid;}
.tag.p{border-color:var(--red);color:var(--red);background:rgba(224,82,82,.08);}
.tag.s{border-color:var(--orange);color:var(--orange);background:rgba(224,125,82,.08);}

/* ── LOG ── */
.log-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
.log-top h2{font-size:20px;font-weight:700;}
.sdate{font-family:var(--mono);font-size:11px;color:var(--text2);margin-top:3px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
.btn{font-family:var(--sans);font-weight:700;font-size:12px;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .15s;border:none;letter-spacing:.04em;text-transform:uppercase;}
.btn-y{background:var(--accent);color:#000;} .btn-y:hover{background:#ffd840;}
.btn-o{background:none;border:1px solid var(--border2);color:var(--text2);} .btn-o:hover{border-color:var(--text2);color:var(--text);}
.btn-sm{font-size:11px;padding:5px 10px;background:none;border:1px solid transparent;color:var(--text3);} .btn-sm:hover{color:var(--red);border-color:var(--red);}
.empty-state{text-align:center;padding:56px 20px;color:var(--text3);}
.empty-state p{font-size:14px;margin-bottom:6px;color:var(--text2);}
.empty-state span{font-size:12px;}
.wex{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.wex-head{display:flex;justify-content:space-between;align-items:center;padding:13px 15px;border-bottom:1px solid var(--border);}
.wex-name{font-size:14px;font-weight:700;}
.wex-primary{font-size:11px;color:var(--text2);margin-top:2px;}
.sets-hdr{display:grid;grid-template-columns:36px 1fr 1fr 1fr 32px;padding:7px 15px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);}
.set-row{display:grid;grid-template-columns:36px 1fr 1fr 1fr 32px;padding:7px 15px;align-items:center;border-bottom:1px solid var(--border);}
.set-row:last-child{border-bottom:none;}
.snum{font-family:var(--mono);font-size:11px;color:var(--text3);}
.sinput{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:13px;width:76px;padding:5px 8px;text-align:center;outline:none;transition:border-color .15s;}
.sinput:focus{border-color:var(--accent);}
.vol{font-family:var(--mono);font-size:12px;color:var(--text2);}
.pr{display:inline-block;background:var(--accent);color:#000;font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;letter-spacing:.06em;margin-left:4px;font-family:var(--mono);vertical-align:middle;}
.add-set-row{padding:9px 15px;border-top:1px solid var(--border);}
.add-set-btn{background:none;border:1px dashed var(--border2);color:var(--text3);font-family:var(--sans);font-size:11px;padding:6px;border-radius:6px;cursor:pointer;width:100%;transition:all .15s;}
.add-set-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── ROUTINES ── */
.routine-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.card h3{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);margin-bottom:14px;}
.routine-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.routine-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;cursor:pointer;transition:all .15s;display:flex;justify-content:space-between;align-items:center;}
.routine-item:hover{border-color:var(--border2);}
.routine-item.active-r{border-color:var(--accent);background:var(--accent-dim);}
.rname{font-size:13px;font-weight:600;}
.rcount{font-size:11px;color:var(--text2);margin-top:2px;}
.create-routine{display:flex;gap:8px;margin-top:10px;}
.rinput{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 12px;outline:none;transition:border-color .15s;}
.rinput:focus{border-color:var(--accent);}
.routine-detail{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.routine-detail-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.rdtitle{font-size:17px;font-weight:700;}
.rd-ex-list{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.rd-ex{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 13px;display:flex;justify-content:space-between;align-items:center;}
.rd-ex-name{font-size:13px;font-weight:500;}
.rd-ex-meta{font-size:10px;color:var(--text2);margin-top:2px;}
.rd-add-section{border-top:1px solid var(--border);padding-top:12px;margin-top:4px;}
.rd-add-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.rd-search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--sans);font-size:12px;padding:7px 11px;outline:none;margin-bottom:8px;transition:border-color .15s;}
.rd-search:focus{border-color:var(--accent);}
.rd-ex-options{display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto;}
.rd-opt{background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:8px 11px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .15s;}
.rd-opt:hover{border-color:var(--border2);}
.rd-opt-name{font-size:12px;font-weight:500;}
.rd-opt-cat{font-size:10px;color:var(--text2);}
.load-routine-btn{width:100%;margin-top:10px;}

/* ── PROGRESS ── */
.prog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;}
.prog-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:15px;cursor:pointer;transition:border-color .15s;}
.prog-card:hover{border-color:var(--border2);}
.pcname{font-size:13px;font-weight:700;margin-bottom:3px;}
.pcsess{font-size:11px;color:var(--text2);margin-bottom:11px;}
.pcstats{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.stat{background:var(--surface2);border-radius:7px;padding:9px;}
.slabel{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.sval{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--accent);}
.sunit{font-size:10px;color:var(--text3);margin-left:2px;}

/* ── MUSCLE MAP ── */
.mmap-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
.mmap-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
.mmap-panel h3{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-bottom:16px;}
.mmap-diagram{display:flex;gap:14px;justify-content:center;margin-bottom:14px;}
.mmap-svg{width:150px;height:270px;}
.heat-legend{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:8px;}
.heat-bar{width:100px;height:8px;border-radius:4px;background:linear-gradient(to right,#1a1a1a,#f5c518);}
.heat-labels{display:flex;justify-content:space-between;width:100px;font-size:9px;color:var(--text3);}
.radar-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
.radar-panel h3{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-bottom:16px;}
.time-btns{display:flex;gap:6px;margin-bottom:14px;}
.tbtn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-family:var(--sans);font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;cursor:pointer;transition:all .15s;}
.tbtn:hover,.tbtn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.muscle-breakdown{margin-top:12px;}
.mb-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.mb-label{font-size:11px;color:var(--text2);width:90px;flex-shrink:0;}
.mb-bar-bg{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.mb-bar-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .6s cubic-bezier(.4,0,.2,1);}
.mb-count{font-family:var(--mono);font-size:11px;color:var(--text3);width:28px;text-align:right;}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#000;font-family:var(--sans);font-size:13px;font-weight:700;padding:10px 20px;border-radius:8px;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:700px){
  .lib-layout,.routine-layout,.mmap-layout{grid-template-columns:1fr;}
  .muscle-panel{position:static;}
  nav button{padding:5px 8px;font-size:10px;}
  main{padding:10px;}
}
</style>
</head>
<body>
<header>
  <div class="logo">PF<span>TRACK</span></div>
  <nav>
    <button class="active" onclick="showTab('library')">Library</button>
    <button onclick="showTab('log')">Log</button>
    <button onclick="showTab('routines')">Routines</button>
    <button onclick="showTab('progress')">Progress</button>
    <button onclick="showTab('musclemap')">Muscle Map</button>
  </nav>
</header>
<main>
  <div class="tab active" id="tab-library">
    <div class="lib-layout">
      <div>
        <div class="cat-strip" id="cat-strip"></div>
        <div class="search-bar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="Search exercises…" id="search-input" oninput="buildLibrary()">
        </div>
        <div class="ex-list" id="ex-list"></div>
      </div>
      <div class="muscle-panel">
        <div class="panel-label">Muscles Worked</div>
        <div class="sel-name" id="sel-name">Select an exercise</div>
        <div class="sel-type" id="sel-type">—</div>
        <div class="diagram-row">
          <div class="svg-wrap"><label>Front</label><svg class="body-svg" id="svg-front" viewBox="0 0 130 240"></svg></div>
          <div class="svg-wrap"><label>Back</label><svg class="body-svg" id="svg-back" viewBox="0 0 130 240"></svg></div>
        </div>
        <div class="legend">
          <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>Primary</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--orange)"></div>Secondary</div>
        </div>
        <div class="tag-section"><div class="tag-label">Primary</div><div class="tags" id="ptags"></div></div>
        <div class="tag-section"><div class="tag-label">Secondary</div><div class="tags" id="stags"></div></div>
      </div>
    </div>
  </div>

  <div class="tab" id="tab-log">
    <div class="log-top">
      <div><h2>Today's Workout</h2><div class="sdate" id="sdate"></div></div>
      <div class="btn-row">
        <button class="btn btn-o" onclick="clearWorkout()">Clear</button>
        <button class="btn btn-y" onclick="saveWorkout()">Save Session</button>
      </div>
    </div>
    <div id="workout-log"></div>
  </div>

  <div class="tab" id="tab-routines">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:20px;font-weight:700">Routines</h2>
    </div>
    <div class="routine-layout">
      <div>
        <div class="card">
          <h3>My Routines</h3>
          <div class="routine-list" id="routine-list"></div>
          <div class="create-routine">
            <input class="rinput" id="routine-name-input" placeholder="e.g. Chest Day" maxlength="30">
            <button class="btn btn-y" onclick="createRoutine()">Create</button>
          </div>
        </div>
      </div>
      <div id="routine-detail-panel">
        <div class="card" style="color:var(--text3);text-align:center;padding:40px 16px;">
          <p style="font-size:13px">Select or create a routine to get started</p>
        </div>
      </div>
    </div>
  </div>

  <div class="tab" id="tab-progress">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:20px;font-weight:700">Progress</h2>
      <div id="prog-back" style="display:none"><button class="btn btn-o" onclick="showAllProgress()">← Back</button></div>
    </div>
    <div id="prog-content"></div>
  </div>

  <div class="tab" id="tab-musclemap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:20px;font-weight:700">Muscle Map</h2>
      <div class="time-btns">
        <button class="tbtn active" onclick="setMapPeriod(7,this)">Week</button>
        <button class="tbtn" onclick="setMapPeriod(30,this)">Month</button>
        <button class="tbtn" onclick="setMapPeriod(9999,this)">All Time</button>
      </div>
    </div>
    <div class="mmap-layout">
      <div class="mmap-panel">
        <h3>Heat Map — Volume by Muscle</h3>
        <div class="mmap-diagram">
          <div class="svg-wrap"><label>Front</label><svg class="mmap-svg" id="mmap-front" viewBox="0 0 130 240"></svg></div>
          <div class="svg-wrap"><label>Back</label><svg class="mmap-svg" id="mmap-back" viewBox="0 0 130 240"></svg></div>
        </div>
        <div class="heat-legend">
          <span style="font-size:9px;color:var(--text3)">Low</span>
          <div class="heat-bar"></div>
          <span style="font-size:9px;color:var(--text3)">High</span>
        </div>
      </div>
      <div class="radar-panel">
        <h3>Muscle Group Balance</h3>
        <canvas id="radar-canvas" width="280" height="280" style="display:block;margin:0 auto 14px;"></canvas>
        <div class="muscle-breakdown" id="muscle-breakdown"></div>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════
const EXERCISES = [
  // CHEST – Machine
  {id:1,name:"Chest Press Machine",cat:"Chest",type:"Machine",primary:["chest"],secondary:["front-delts","triceps"]},
  {id:2,name:"Pec Deck / Fly Machine",cat:"Chest",type:"Machine",primary:["chest"],secondary:["front-delts"]},
  {id:3,name:"Smith Machine Bench Press",cat:"Chest",type:"Smith Machine",primary:["chest"],secondary:["front-delts","triceps"]},
  {id:4,name:"Cable Crossover (Low to High)",cat:"Chest",type:"Cable",primary:["chest"],secondary:["front-delts","biceps"]},
  {id:5,name:"Cable Crossover (High to Low)",cat:"Chest",type:"Cable",primary:["chest"],secondary:["front-delts"]},
  // CHEST – Bodyweight
  {id:6,name:"Push-Up",cat:"Chest",type:"Bodyweight",primary:["chest"],secondary:["front-delts","triceps","core"]},
  {id:7,name:"Wide Push-Up",cat:"Chest",type:"Bodyweight",primary:["chest"],secondary:["front-delts","triceps"]},
  {id:8,name:"Diamond Push-Up",cat:"Chest",type:"Bodyweight",primary:["triceps"],secondary:["chest","front-delts"]},
  {id:9,name:"Dip (Chest Focus)",cat:"Chest",type:"Bodyweight",primary:["chest"],secondary:["front-delts","triceps"]},

  // BACK – Machine
  {id:10,name:"Lat Pulldown Machine",cat:"Back",type:"Machine",primary:["lats"],secondary:["biceps","rear-delts","rhomboids"]},
  {id:11,name:"Seated Row Machine",cat:"Back",type:"Machine",primary:["lats","rhomboids"],secondary:["biceps","rear-delts"]},
  {id:12,name:"Cable Seated Row",cat:"Back",type:"Cable",primary:["lats","rhomboids"],secondary:["biceps","rear-delts"]},
  {id:13,name:"Assisted Pull-Up Machine",cat:"Back",type:"Machine",primary:["lats"],secondary:["biceps","rhomboids"]},
  {id:14,name:"Back Extension Machine",cat:"Back",type:"Machine",primary:["lower-back"],secondary:["glutes","hamstrings"]},

function colorForMuscle(muscle, primary, secondary, alpha=1) {
  if (primary.includes(muscle)) return `rgba(224,82,82,${alpha})`;
  if (secondary.includes(muscle)) return `rgba(224,125,82,${alpha})`;
  return `rgba(40,40,40,0.6)`;
}

function buildSVG(side, primary=[], secondary=[]) {
  const base = side==='front' ? BODY_BASE_FRONT : BODY_BASE_BACK;
  const muscles = MUSCLES[side];
  let muscleSVG = '';
  for (const [muscle, paths] of Object.entries(muscles)) {
    const color = colorForMuscle(muscle, primary, secondary);
    const isActive = primary.includes(muscle)||secondary.includes(muscle);
    const glow = isActive ? `filter="url(#glow-${side})"` : '';
    muscleSVG += `<g fill="${color}" stroke="${isActive?(primary.includes(muscle)?'#e05252':'#e07d52'):'#2a2a2a'}" stroke-width="0.5" ${glow}>${paths}</g>`;
  }
  return `<defs>
    <filter id="glow-${side}" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  ${base}${muscleSVG}`;
}

function heatColor(t) {
  // t 0–1: dark -> orange -> yellow
  if (t <= 0) return 'rgba(30,30,30,0.5)';
  const r = Math.round(30 + t*194);
  const g = Math.round(30 + t*167 - (t>0.5?((t-0.5)*2)*30:0));
  const b = Math.round(30 - t*30);
  return `rgba(${r},${g},${b},0.85)`;
}

function buildHeatmapSVG(side, muscleVolumes, maxVol) {
  const base = side==='front' ? BODY_BASE_FRONT : BODY_BASE_BACK;
  const muscles = MUSCLES[side];
  let muscleSVG = '';
  for (const [muscle, paths] of Object.entries(muscles)) {
    const vol = muscleVolumes[muscle]||0;
    const t = maxVol>0 ? Math.min(vol/maxVol, 1) : 0;
    const color = heatColor(t);
    const stroke = t>0.1 ? '#e07d52' : '#2a2a2a';
    const glowStr = t>0.1 ? `filter="url(#hglow-${side})"` : '';
    muscleSVG += `<g fill="${color}" stroke="${stroke}" stroke-width="0.5" ${glowStr}>${paths}</g>`;
  }
  return `<defs>
    <filter id="hglow-${side}" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  ${base}${muscleSVG}`;
}

function buildLibrary() {

function addToWorkout(id,e) {
  if(e)e.stopPropagation();
  const ex=EXERCISES.find(x=>x.id===id);
  if(!ex)return;
  if(currentWorkout.find(w=>w.exerciseId===id)){showToast(`Already in workout`);return;}
  currentWorkout.push({exerciseId:id,sets:[{weight:'',reps:''}]});
  saveCur();
  showToast(`Added ${ex.name}`);
  if(document.getElementById('tab-log').classList.contains('active'))renderLog();
}

function renderLog() {
  const d=new Date();
  document.getElementById('sdate').textContent=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const c=document.getElementById('workout-log');
  if(!currentWorkout.length){
    c.innerHTML=`<div class="empty-state"><p>No exercises added yet.</p><span>Go to Library and tap + Log on any exercise.</span></div>`;
    return;
  }
  c.innerHTML='';
  currentWorkout.forEach((entry,wi)=>{
    const ex=EXERCISES.find(x=>x.id===entry.exerciseId);
    if(!ex)return;
    const div=document.createElement('div');
    div.className='wex';
    div.innerHTML=`<div class="wex-head">
      <div><div class="wex-name">${ex.name}</div><div class="wex-primary">${ex.primary.map(m=>MUSCLE_NAMES[m]||m).join(', ')}</div></div>
      <button class="btn btn-sm" onclick="removeExercise(${wi})">✕ Remove</button>
    </div>
    <div class="sets-hdr"><span>Set</span><span>${ex.type==='Bodyweight'||ex.type==='Cardio'?'Duration/Notes':'Weight (lbs)'}</span><span>Reps</span><span>Vol.</span><span></span></div>
    <div id="sets-${wi}"></div>
    <div class="add-set-row"><button class="add-set-btn" onclick="addSet(${wi})">+ Add Set</button></div>`;
    c.appendChild(div);
    renderSets(wi);
  });
}

function renderSets(wi) {
  const entry=currentWorkout[wi];
  const ex=EXERCISES.find(x=>x.id===entry.exerciseId);
  const bw=ex?.type==='Bodyweight'||ex?.type==='Cardio';
  const pr=getPR(entry.exerciseId);
  const c=document.getElementById(`sets-${wi}`);
  if(!c)return;
  c.innerHTML='';
  entry.sets.forEach((set,si)=>{
    const vol=set.weight&&set.reps&&!bw?(parseFloat(set.weight)*parseInt(set.reps)).toFixed(0):'—';
    const isPR=!bw&&pr!==null&&set.weight&&parseFloat(set.weight)>pr;
    const row=document.createElement('div');
    row.className='set-row';
    row.innerHTML=`<span class="snum">${si+1}</span>
      <span><input class="sinput" type="${bw?'text':'number'}" min="0" placeholder="${bw?'—':'0'}" value="${set.weight}" oninput="updateSet(${wi},${si},'weight',this.value)" style="width:${bw?'90px':'76px'}"/></span>
      <span><input class="sinput" type="number" min="0" placeholder="0" value="${set.reps}" oninput="updateSet(${wi},${si},'reps',this.value)"/></span>
      <span class="vol">${vol}${isPR?'<span class="pr">PR</span>':''}</span>
      <span><button class="btn btn-sm" style="padding:2px 6px" onclick="removeSet(${wi},${si})">✕</button></span>`;
    c.appendChild(row);
  });
}

function updateSet(wi,si,field,val){currentWorkout[wi].sets[si][field]=val;saveCur();renderSets(wi);}
function addSet(wi){currentWorkout[wi].sets.push({weight:'',reps:''});saveCur();renderLog();}
function removeSet(wi,si){
  currentWorkout[wi].sets.splice(si,1);
  if(!currentWorkout[wi].sets.length)currentWorkout[wi].sets.push({weight:'',reps:''});
  saveCur();renderLog();
}
function removeExercise(wi){currentWorkout.splice(wi,1);saveCur();renderLog();}
function clearWorkout(){if(!confirm('Clear workout?'))return;currentWorkout=[];saveCur();renderLog();}
function saveWorkout(){
  const valid=currentWorkout.filter(e=>e.sets.some(s=>s.weight!==''||s.reps!==''));
  if(!valid.length){showToast('Log some sets first!');return;}
  sessions.push({date:new Date().toISOString(),exercises:valid.map(e=>({
    exerciseId:e.exerciseId,
    name:EXERCISES.find(x=>x.id===e.exerciseId)?.name||'',
    sets:e.sets.filter(s=>s.weight!==''||s.reps!=='')
  }))});
  localStorage.setItem('pft_sess',JSON.stringify(sessions));
  currentWorkout=[];saveCur();renderLog();
  showToast('Workout saved! 💪');
  if(document.getElementById('tab-musclemap').classList.contains('active'))renderMuscleMap();
}
function saveCur(){localStorage.setItem('pft_cur',JSON.stringify(currentWorkout));}

function deleteRoutine(i,e){

function removeFromRoutine(i){

}
function loadRoutineToLog(){
  const r=routines[selRoutineIdx];

function getPR(id){
  let max=null;
  sessions.forEach(s=>{
    const ex=s.exercises.find(e=>e.exerciseId===id);
    if(ex)ex.sets.forEach(st=>{const w=parseFloat(st.weight);if(!isNaN(w)&&(max===null||w>max))max=w;});
  });
  return max;
}

function getHistory(id){
  return sessions.filter(s=>s.exercises.some(e=>e.exerciseId===id))
    .map(s=>{
      const ex=s.exercises.find(e=>e.exerciseId===id);
      const weights=ex.sets.map(s=>parseFloat(s.weight)).filter(w=>!isNaN(w));
      const totalVol=ex.sets.reduce((a,s)=>{const w=parseFloat(s.weight),r=parseInt(s.reps);return a+(isNaN(w)||isNaN(r)?0:w*r);},0);
      return{date:s.date,sets:ex.sets,maxWeight:weights.length?Math.max(...weights):0,totalVolume:totalVol};
    })
    .sort((a,b)=>new Date(a.date)-new Date(b.date));
}

function drawMini(id,h){
  const el=document.getElementById(id);
  if(!el)return;
  const ctx=el.getContext('2d');
  el.width=el.offsetWidth||240;el.height=50;
  const w=el.width,ht=el.height;
  ctx.fillStyle='#161616';ctx.fillRect(0,0,w,ht);
  if(h.length<2){
    ctx.fillStyle='#333';ctx.font='10px Space Grotesk';ctx.textAlign='center';
    ctx.fillText(h.length?'1 session — need more data':'No data',w/2,28);return;
  }
  const data=h.map(x=>x.maxWeight);
  const mn=Math.min(...data),mx=Math.max(...data);
  const pad=5;
  ctx.beginPath();
  data.forEach((v,i)=>{
    const x=pad+(i/(data.length-1))*(w-pad*2);
    const y=ht-pad-((v-mn)/(mx-mn||1))*(ht-pad*2);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.strokeStyle='#f5c518';ctx.lineWidth=1.8;ctx.stroke();
  data.forEach((v,i)=>{
    const x=pad+(i/(data.length-1))*(w-pad*2);
    const y=ht-pad-((v-mn)/(mx-mn||1))*(ht-pad*2);
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle='#f5c518';ctx.fill();
  });
}

function drawDetail(id,h){
  const el=document.getElementById(id);
  if(!el||!h.length)return;
  const ctx=el.getContext('2d');
  el.width=el.offsetWidth||600;el.height=90;
  const w=el.width,ht=el.height;
  ctx.fillStyle='#111';ctx.fillRect(0,0,w,ht);
  const data=h.map(x=>x.maxWeight);
  const labels=h.map(x=>{const d=new Date(x.date);return`${d.getMonth()+1}/${d.getDate()}`;});
  const mn=Math.min(...data)*0.9,mx=Math.max(...data)*1.06;
  const pL=34,pR=10,pT=10,pB=22;
  const dw=w-pL-pR,dh=ht-pT-pB;
  // grid
  for(let i=0;i<=2;i++){
    const y=pT+(i/2)*dh;
    ctx.strokeStyle='#222';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(w-pR,y);ctx.stroke();
    ctx.fillStyle='#444';ctx.font='9px Space Mono';ctx.textAlign='right';
    ctx.fillText(Math.round(mx-(i/2)*(mx-mn)),pL-3,y+3);
  }
  if(data.length>1){
    ctx.beginPath();
    data.forEach((v,i)=>{
      const x=pL+(i/(data.length-1))*dw;
      const y=pT+(1-(v-mn)/(mx-mn))*dh;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.strokeStyle='#f5c518';ctx.lineWidth=2.5;ctx.stroke();
  }
  data.forEach((v,i)=>{
    const x=pL+(data.length>1?(i/(data.length-1))*dw:dw/2);
    const y=pT+(1-(v-mn)/(mx-mn||1))*dh;
    ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fillStyle='#f5c518';ctx.fill();
    ctx.fillStyle='#555';ctx.font='9px Space Grotesk';ctx.textAlign='center';
    ctx.fillText(labels[i],x,ht-6);
  });
}

// ═══════════════════════════════════════════════════════
// MUSCLE MAP
// ═══════════════════════════════════════════════════════
function setMapPeriod(days,btn){
  mapDays=days;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderMuscleMap();
}

function getMuscleVolumes(){
  const cutoff=new Date(Date.now()-mapDays*864e5);
  const vols={};
  sessions.forEach(s=>{
    if(new Date(s.date)<cutoff)return;
    s.exercises.forEach(e=>{
      const ex=EXERCISES.find(x=>x.id===e.exerciseId);
      if(!ex)return;
      const totalSets=e.sets.length||1;
      const allMuscles=[...ex.primary.map(m=>({m,w:1})),...ex.secondary.map(m=>({m,w:0.4}))];
      allMuscles.forEach(({m,w})=>{
        vols[m]=(vols[m]||0)+totalSets*w;
      });
    });
  });
  return vols;
}

function renderMuscleMap(){
  const vols=getMuscleVolumes();
  const maxVol=Math.max(1,...Object.values(vols));

  document.getElementById('mmap-front').innerHTML=buildHeatmapSVG('front',vols,maxVol);
  document.getElementById('mmap-back').innerHTML=buildHeatmapSVG('back',vols,maxVol);

  drawRadar(vols,maxVol);
  drawBreakdown(vols,maxVol);
}

function drawRadar(vols,maxVol){
  const canvas=document.getElementById('radar-canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);

  const cx=W/2,cy=H/2,R=Math.min(W,H)/2-32;
  const n=RADAR_GROUPS.length;
  // Compute group totals
  const totals=RADAR_GROUPS.map(g=>({
    label:g.label,
    val:g.muscles.reduce((a,m)=>a+(vols[m]||0),0)
  }));
  const maxT=Math.max(1,...totals.map(t=>t.val));

  // grid rings
  [0.25,0.5,0.75,1].forEach(r=>{
    ctx.beginPath();
    for(let i=0;i<n;i++){
      const ang=-Math.PI/2+(i/n)*Math.PI*2;
      const x=cx+Math.cos(ang)*R*r;
      const y=cy+Math.sin(ang)*R*r;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle=r===1?'#2e2e2e':'#1e1e1e';
    ctx.lineWidth=1;
    ctx.stroke();
  });

  // spokes
  for(let i=0;i<n;i++){
    const ang=-Math.PI/2+(i/n)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(ang)*R,cy+Math.sin(ang)*R);
    ctx.strokeStyle='#222';ctx.lineWidth=1;ctx.stroke();
  }

  // data polygon
  ctx.beginPath();
  totals.forEach((t,i)=>{
    const ang=-Math.PI/2+(i/n)*Math.PI*2;
    const r2=R*(t.val/maxT);
    const x=cx+Math.cos(ang)*r2;
    const y=cy+Math.sin(ang)*r2;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.fillStyle='rgba(245,197,24,0.12)';ctx.fill();
  ctx.strokeStyle='#f5c518';ctx.lineWidth=2;ctx.stroke();

  // dots + labels
  totals.forEach((t,i)=>{
    const ang=-Math.PI/2+(i/n)*Math.PI*2;
    const r2=R*(t.val/maxT);
    const dx=cx+Math.cos(ang)*r2,dy=cy+Math.sin(ang)*r2;
    ctx.beginPath();ctx.arc(dx,dy,4,0,Math.PI*2);
    ctx.fillStyle='#f5c518';ctx.fill();
    // label
    const lx=cx+Math.cos(ang)*(R+18),ly=cy+Math.sin(ang)*(R+18);
    ctx.fillStyle=t.val>0?'#ccc':'#444';
    ctx.font=`${t.val>0?'600':'400'} 11px Space Grotesk`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(t.label,lx,ly);
  });
}

function drawBreakdown(vols,maxVol){
  const bd=document.getElementById('muscle-breakdown');
  const allMuscles=Object.entries(vols).sort((a,b)=>b[1]-a[1]);
  const maxV=Math.max(1,...allMuscles.map(x=>x[1]));
  bd.innerHTML='<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Volume by Muscle</div>';
  if(!allMuscles.length){
    bd.innerHTML+='<div style="font-size:12px;color:var(--text3)">No workout data for this period.</div>';
    return;
  }
  allMuscles.slice(0,12).forEach(([m,v])=>{
    const row=document.createElement('div');
    row.className='mb-row';
    row.innerHTML=`<span class="mb-label">${MUSCLE_NAMES[m]||m}</span>
      <div class="mb-bar-bg"><div class="mb-bar-fill" style="width:${(v/maxV*100).toFixed(1)}%"></div></div>
      <span class="mb-count">${Math.round(v)}</span>`;
    bd.appendChild(row);
  });
}

function showTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  const idx=['library','log','routines','progress','musclemap'].indexOf(id);
  if(idx>=0)document.querySelectorAll('nav button')[idx].classList.add('active');
  if(id==='log')renderLog();
  if(id==='routines')renderRoutines();
  if(id==='progress')renderProgress();
  if(id==='musclemap')renderMuscleMap();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
